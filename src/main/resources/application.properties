# Application Name
spring.application.name=proconnect-backend

# Server Port
server.port=8080

# Database Configuration (local defaults — overridden by env vars in production)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/proconnect}
spring.datasource.username=${DB_USERNAME:proconnect}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Production overrides via environment variables:
# Set DATABASE_URL, DB_USERNAME, DB_PASSWORD in your cloud platform (Railway/Render/etc.)

# JPA Configuration — schema.sql owns DDL; Hibernate only validates
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# DDL (tables, indexes, triggers) — idempotent, safe to re-run.
# To wipe and rebuild from scratch locally: psql -U proconnect -d proconnect -f src/main/resources/schema-reset.sql
# To apply schema changes only: psql -U proconnect -d proconnect -f src/main/resources/schema.sql
# To seed data only:            psql -U proconnect -d proconnect -f src/main/resources/seed.sql
spring.sql.init.mode=never
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:seed.sql
# Use ^^ as statement separator so PL/pgSQL $$ blocks aren't split on ;
spring.sql.init.separator=^^

# CORS Configuration
cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}

# Actuator — expose health endpoint for cloud platform health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.com.proconnect=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Mail — OTP email (configure via env vars in production)
# Resend SMTP ports: 587 or 2587 (STARTTLS) | 465 or 2465 (SSL)
# Use 2587 on Render/Railway as 587 and 465 are often blocked
spring.mail.host=${MAIL_HOST:smtp.resend.com}
spring.mail.port=${MAIL_PORT:2587}
spring.mail.username=${MAIL_USERNAME:resend}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SSL_ENABLE:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
# Set to true to skip actual sending during local dev (logs OTP instead)
app.mail.dev-mode=${MAIL_DEV_MODE:true}
app.mail.from=${MAIL_FROM:noreply@proconnect.in}

# JWT
app.jwt.secret=${JWT_SECRET:change-me-in-production-secret-min-32-chars!!}
app.jwt.expiry-days=${JWT_EXPIRY_DAYS:30}
# Set to true in production (HTTPS only) — cookie will not be sent over plain HTTP
app.cookie.secure=${COOKIE_SECURE:false}

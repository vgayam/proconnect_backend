# Production Profile — active when SPRING_PROFILES_ACTIVE=prod

# Port — Render injects PORT env var; fall back to 8080 for other platforms
server.port=${PORT:8080}

# Database — Render provides JDBC_DATABASE_URL with correct jdbc: prefix automatically
# Use JDBC_DATABASE_URL (Render auto-sets this), fall back to DATABASE_URL
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — ddl-auto=none, schema managed entirely by schema.sql
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Schema — run schema.sql on every startup.
# All statements use CREATE TABLE IF NOT EXISTS / CREATE OR REPLACE
# so this is fully idempotent and safe to run repeatedly.
spring.sql.init.mode=never
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.separator=^^
spring.sql.init.continue-on-error=false
# Ensure SQL init runs before JPA/Hibernate tries to validate the schema
spring.jpa.defer-datasource-initialization=true

# Logging — reduce noise in production
logging.level.com.proconnect=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# Mail — set MAIL_DEV_MODE=false + MAIL_PASSWORD=<Resend API key> in prod env vars
# Resend SMTP defaults (override via env vars if using Gmail instead)
app.mail.dev-mode=${MAIL_DEV_MODE:false}

# Feature flags
# Set NOTIFY_PROFESSIONAL_ON_CONTACT=true in Railway env vars to enable lead notifications
app.contact.notify-professional=${NOTIFY_PROFESSIONAL_ON_CONTACT:false}

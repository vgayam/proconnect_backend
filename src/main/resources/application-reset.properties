# Reset Profile — active when SPRING_PROFILES_ACTIVE=reset
# ⚠️  DESTROYS ALL DATA then recreates schema from scratch.
# Usage on Render:
#   1. Set env var SPRING_PROFILES_ACTIVE=reset  → deploy/restart once
#   2. Set env var SPRING_PROFILES_ACTIVE=prod   → deploy/restart to go back to normal

# Inherit all prod DB + mail config
spring.config.import=application-prod.properties

# Override schema init: drop everything first, then recreate
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-reset.sql,classpath:schema.sql
spring.sql.init.separator=^^
spring.sql.init.continue-on-error=false
spring.jpa.defer-datasource-initialization=true
spring.jpa.hibernate.ddl-auto=none
